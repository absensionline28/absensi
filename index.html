<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Absensi Modern</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg1: #2563eb; --bg2: #1e40af; --card: rgba(255,255,255,0.2); --danger: #ef4444; --success: #10b981;
}
* { box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; max-width: 420px; margin: auto; background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%); min-height: 100vh; color: #fff; }
.card { background: var(--card); backdrop-filter: blur(20px); border-radius: 20px; padding: 16px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 14px; border: none; font-size: 16px; color: #333; }
label { font-size: 14px; font-weight: 600; display: block; margin-top: 10px; color: #fff; }
button { width: 100%; padding: 16px; margin: 8px 0; border: none; border-radius: 14px; background: #3b82f6; color: white; font-weight: 700; font-size: 16px; cursor: pointer; }
button.cam { background: #f59e0b; font-size: 14px; padding: 12px; }
button.kirim { background: var(--success); }
button.logout { background: rgba(255,255,255,0.2); }
button.export { background: #2563eb; padding: 12px; font-size: 14px; margin-bottom: 12px; }
canvas { max-width: 100%; margin: 8px 0; border-radius: 12px; border: 2px solid rgba(255,255,255,0.3); }
.menu { display: flex; gap: 8px; margin-bottom: 16px; }
.menu button { flex: 1; font-size: 11px; padding: 10px 6px; border-radius: 12px; }
.cam-group { display: flex; gap: 8px; }
.cam-group button { flex: 1; }
table { width: 100%; background: #fff; border-radius: 12px; font-size: 11px; color: #333; border-collapse: collapse; min-width: 500px; }
th, td { padding: 8px 6px; border-bottom: 1px solid #eee; text-align: left; white-space: nowrap; }
th { background: #2563eb; color: white; font-weight: 700; font-size: 10px; position: sticky; top: 0; z-index: 1; }
tr:nth-child(even) { background: #f8fafc; }
tr:hover { background: #e0f2fe; }
td img { width: 45px; height: 45px; object-fit: cover; border-radius: 6px; cursor: pointer; }
h2, h3 { text-align: center; color: #fff; margin: 0 0 12px 0; font-size: 18px; }
.text-red { color: var(--danger)!important; font-weight: 700; }
.text-green { color: var(--success)!important; font-weight: 700; }
.info-lokasi { font-size: 11px; color: #e2e8f0; margin-top: 4px; text-align: center; }
</style>
</head>

    <input type="file" id="foto2" accept="image/*" style="display:none">
    <canvas id="canvas2"></canvas>

function formatTanggal(tgl){
  if(!tgl || tgl === 'null') return '-';
  const date = new Date(tgl);
  if(isNaN(date)) return tgl;
  const opsi = { day: '2-digit', month: 'short', year: 'numeric' };
  return date.toLocaleDateString('id-ID', opsi).replace('.', '');
}

function setWaktu(){
  const now = new Date();
  const tgl = now.toISOString().split('T')[0];
  const jam = now.toTimeString().split(' ')[0].slice(0,5);
  document.getElementById('tanggalMasuk').value = tgl;
  document.getElementById('jamMasuk').value = jam;
  document.getElementById('tanggalPulang').value = tgl;
  document.getElementById('jamPulang').value = jam;
  document.getElementById('tanggal3').value = tgl;
  cekJamMasuk(); cekJamPulang();
}

function cekJamMasuk(){
  const jam = document.getElementById('jamMasuk').value;
  const warning = document.getElementById('warningMasuk');

    warning.textContent = '(Terlambat!)'; warning.className = 'text-red';

}

// FUNGSI TOGGLE TABEL BARU
function toggleTabel(id, btn){
  const div = document.getElementById(id);
  if(div.style.display === 'none'){
    div.style.display = 'block';
    btn.textContent = '👁️ Sembunyikan';
  } else {

    btn.textContent = '👁️ Tampilkan';
  }
}

function getGPS(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos => {
      lokasiGPS.lat = pos.coords.latitude;
      lokasiGPS.lng = pos.coords.longitude;
    }, err => console.log('GPS error:', err), {enableHighAccuracy: true, timeout: 10000});
  }
}

function ambilFoto(inputId, facingMode, canvasId, infoId){
  const input = document.getElementById(inputId);
  input.setAttribute('capture', facingMode);
  input.onchange = e => prosesFoto(e, canvasId, infoId);
  input.click();
}

function prosesFoto(e, canvasId, infoId){
  const file = e.target.files[0];
  if(!file) return;

  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const img = new Image();
  const reader = new FileReader();

  reader.onload = function(event){
    img.onload = function(){
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);

      const now = new Date();
      const tgl = now.toLocaleDateString('id-ID', {day: '2-digit', month: 'short', year: 'numeric'});
      const jam = now.toLocaleTimeString('id-ID', {hour: '2-digit', minute: '2-digit', second: '2-digit'});
      const lat = lokasiGPS.lat? lokasiGPS.lat.toFixed(6) : '0.000';
      const lng = lokasiGPS.lng? lokasiGPS.lng.toFixed(6) : '0.000';

      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillRect(0, canvas.height - 110, canvas.width, 110);

      ctx.fillStyle = 'white';
      ctx.font = 'bold 34px Arial';
      ctx.fillText(jam, 25, canvas.height - 65);
      ctx.font = '24px Arial';
      ctx.fillText(tgl, 25, canvas.height - 30);
      ctx.font = '20px Arial';
      ctx.fillText(`📍 ${lat}, ${lng}`, 25, canvas.height - 5);

      if(lokasiGPS.lat && lokasiGPS.lng){
        const mapSize = Math.min(canvas.width * 0.28, 160);
        const mapX = canvas.width - mapSize - 15;
        const mapY = 15;

        ctx.fillStyle = 'white';
        ctx.fillRect(mapX-3, mapY-3, mapSize+6, mapSize+6);

        const mapImg = new Image();
        mapImg.crossOrigin = 'anonymous';
        mapImg.src = `https://static-maps.yandex.ru/1.x/?lang=id_ID&ll=${lng},${lat}&z=17&l=map&size=${mapSize},${mapSize}&pt=${lng},${lat},pm2rdl`;

        mapImg.onload = function(){
          ctx.drawImage(mapImg, mapX, mapY, mapSize, mapSize);
          ctx.strokeStyle = '#2563eb';
          ctx.lineWidth = 4;
          ctx.strokeRect(mapX, mapY, mapSize, mapSize);
          document.getElementById(infoId).textContent = `✅ Foto siap | Map nempel | ${lat}, ${lng}`;
        };
        mapImg.onerror = function(){
          document.getElementById(infoId).textContent = `📍 ${lat}, ${lng} | 🕐 ${tgl} ${jam}`;
        };
      } else {
        document.getElementById(infoId).textContent = `⚠️ GPS mati | 🕐 ${tgl} ${jam}`;
      }
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(file);
}

async function uploadFoto(canvasId, folder){
  const canvas = document.getElementById(canvasId);
  return new Promise(resolve => {
    canvas.toBlob(async blob => {
      const file = new File([blob], 'selfie.jpg', { type: 'image/jpeg' });
      const namaFile = folder + '/' + Date.now() + '-' + file.name;
      const { data, error } = await db.storage.from('foto-absen').upload(namaFile, file);
      if(error){ alert('Upload gagal: ' + error.message); resolve(''); }
      resolve(db.storage.from('foto-absen').getPublicUrl(namaFile).data.publicUrl);
    }, 'image/jpeg', 0.85);
  });
}

async function kirimMasuk(){
  const status = document.getElementById('status1');

    id_manual: document.getElementById('id1').value,

async function kirimSanggahan(){

async function loadMasuk(){
  const { data, error } = await db.from('absen_masuk').select('*').order('tanggal_masuk', {ascending: false}).limit(200);
  if(error){ alert('Error load masuk: ' + error.message); return; }
  dataMasukGlobal = data || [];
  renderMasuk();
}

function renderMasuk(){
  if(dataMasukGlobal.length === 0){
    document.getElementById('tabelMasuk').innerHTML = `<tr><td colspan="7" style="text-align:center">Data tidak ditemukan</td></tr>`;
    return;
  }
  document.getElementById('tabelMasuk').innerHTML = dataMasukGlobal.map((r,i) => {
    const jam = r.jam_masuk? r.jam_masuk.slice(0,5) : '-';
    const statusJam = jam > '07:00'? '<span class="text-red">Terlambat</span>' : '<span class="text-green">Tepat</span>';
    return `<tr><td>${i+1}</td><td>${r.nama}</td><td>${r.id_karyawan}</td><td>${formatTanggal(r.tanggal_masuk)}</td><td>${jam}</td><td>${statusJam}</td><td>${r.foto_masuk? `<img src="${r.foto_masuk}" onclick="window.open(this.src)">` : '-'}</td></tr>`;
  }).join('');
}

async function loadPulang(){
  const { data, error } = await db.from('absen_pulang').select('*').order('tanggal_pulang', {ascending: false}).limit(200);
  if(error){ alert('Error load pulang: ' + error.message); return; }
  dataPulangGlobal = data || [];
  renderPulang();
}

function renderPulang(){
  if(dataPulangGlobal.length === 0){
    document.getElementById('tabelPulang').innerHTML = `<tr><td colspan="7" style="text-align:center">Data tidak ditemukan</td></tr>`;
    return;
  }
  document.getElementById('tabelPulang').innerHTML = dataPulangGlobal.map((r,i) => {
    const jam = r.jam_pulang? r.jam_pulang.slice(0,5) : '-';
    const statusJam = jam < '21:00'? '<span class="text-red">Pulang Cepat</span>' : '<span class="text-green">Normal</span>';
    return `<tr><td>${i+1}</td><td>${r.nama}</td><td>${r.id_karyawan}</td><td>${formatTanggal(r.tanggal_pulang)}</td><td>${jam}</td><td>${statusJam}</td><td>${r.foto_pulang? `<img src="${r.foto_pulang}" onclick="window.open(this.src)">` : '-'}</td></tr>`;
  }).join('');
}

async function loadSanggah(){
  const { data, error } = await db.from('sanggahan').select('*').order('tanggal', {ascending: false}).limit(200);
  if(error){ alert('Error load sanggah: ' + error.message); return; }
  document.getElementById('tabelSanggah').innerHTML = data.map((r,i) =>
    `<tr><td>${i+1}</td><td>${formatTanggal(r.tanggal)}</td><td>${r.nama}</td><td>${r.id_karyawan}</td><td>${r.keterangan}</td><td>${r.type}</td><td>${r.foto? `<img src="${r.foto}" onclick="window.open(this.src)">` : '-'}</td></tr>`
  ).join('');
}

function loadSemua(){ loadMasuk(); loadPulang(); loadSanggah(); }
setInterval(loadSemua, 15000);

function exportExcel(type){
  const data = type === 'masuk'? dataMasukGlobal : dataPulangGlobal;
  if(data.length === 0){ alert('⚠️ Data kosong!'); return; }
  const namaFilter = prompt('Filter Nama Karyawan\nKosongkan untuk export semua:', '');
  const filter = namaFilter? namaFilter.toLowerCase() : '';
  const filtered = filter? data.filter(r => r.nama.toLowerCase().includes(filter)) : data;
  if(filtered.length === 0){ alert('⚠️ Data tidak ditemukan'); return; }

  const wsData = [['No','Nama','ID Karyawan','Tanggal','Jam', type === 'masuk'? 'Status Masuk' : 'Status Pulang', 'Latitude', 'Longitude']];
  filtered.forEach((r,i) => {
    const jam = type === 'masuk'? (r.jam_masuk? r.jam_masuk.slice(0,5) : '-') : (r.jam_pulang? r.jam_pulang.slice(0,5) : '-');
    const tgl = type === 'masuk'? formatTanggal(r.tanggal_masuk) : formatTanggal(r.tanggal_pulang);
    const status = type === 'masuk'? (jam > '07:00'? 'Terlambat' : 'Tepat Waktu') : (jam < '21:00'? 'Pulang Cepat' : 'Normal');
    wsData.push([i+1, r.nama, r.id_karyawan, tgl, jam, status, r.latitude || '', r.longitude || '']);
  });

  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{wch: 5}, {wch: 25}, {wch: 15}, {wch: 15}, {wch: 10}, {wch: 15}, {wch: 12}, {wch: 12}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, type === 'masuk'? 'Absen Masuk' : 'Absen Pulang');
  XLSX.writeFile(wb, `Absensi_${type}_${new Date().toISOString().split('T')[0]}.xlsx`);
  alert(`✅ Export berhasil! ${filtered.length} data`);
}
