<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absen</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#111;color:#fff;font-family:sans-serif;text-align:center;padding:30px}
input,button{width:90%;padding:15px;margin:10px;font-size:18px;border-radius:10px;border:0}
input{background:#333;color:#fff}
button{background:#0af;color:#000;font-weight:bold}
video{width:90%;border-radius:10px;background:#000}
</style>
</head>
<body>
<h2>ABSENSI</h2>
<input id="nama" placeholder="TULIS NAMA KAMU">
<br>
<video id="cam" autoplay playsinline></video>
<br>
<button onclick="absen('masuk')">ABSEN MASUK</button>
<button onclick="absen('pulang')">ABSEN PULANG</button>
<p id="pesan"></p>

<script>
// GANTI 2 BARIS INI AJA PAKE PUNYAMU
const URL = 'https://gdvrrwalbchwmgaucttl.supabase.co'
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkdnJyd2FsYmNod21nYXVjdHRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MzM5MDQsImV4cCI6MjA5NjUwOTkwNH0._lrG5HkGdStq2c3Zbgxbwg8BJ6wlE3TleI69jjvzxjU'
const db = supabase.createClient(URL, KEY)

navigator.mediaDevices.getUserMedia({video:true}).then(s=>{
  document.getElementById('cam').srcObject = s
})

async function absen(jenis){
  const nama = document.getElementById('nama').value
  const pesan = document.getElementById('pesan')
  
  if(!nama){alert('ISI NAMA DULU');return}
  
  pesan.textContent = 'Ngirim...'
  
  const video = document.getElementById('cam')
  const c = document.createElement('canvas')
  c.width = video.videoWidth
  c.height = video.videoHeight
  c.getContext('2d').drawImage(video,0,0)
  const blob = await fetch(c.toDataURL()).then(r=>r.blob())
  
  const file = nama + '_' + Date.now() + '.jpg'
  await db.storage.from('absensi-foto').upload(file, blob)
  const url = db.storage.from('absensi-foto').getPublicUrl(file).data.publicUrl
  
  await db.from('absensi').insert({nama:nama, status:jenis, foto_url:url, waktu_absen:new Date()})
  
  pesan.textContent = '✅ BERHASIL ABSEN ' + jenis.toUpperCase()
}
</script>
</body>
</html>
