<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi Masuk Pulang</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;padding:20px;max-width:500px;margin:auto;background:#f4f4f4}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 2px 5px rgba(0,0,0,0.1);margin-bottom:15px}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ccc;font-size:16px}
button{background:#28a745;color:white;border:none;cursor:pointer;font-weight:bold}
button:disabled{background:gray}
video,img{width:100%;border-radius:8px;margin-top:10px}
#riwayat div{border-bottom:1px solid #eee;padding:8px 0;font-size:14px}
</style>
</head>
<body>

<h2>Absensi Foto</h2>

<div class="card">
<input type="text" id="nama" placeholder="Masukkan Nama Lengkap">
<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none"></canvas>
<button id="btnMasuk">📸 JEPRET MASUK</button>
<button id="btnPulang" disabled>📸 JEPRET PULANG</button>
<div id="status"></div>
</div>

<div class="card">
<h3>Riwayat Hari Ini</h3>
<div id="riwayat">Loading...</div>
</div>

<script>
const SUPABASE_URL = 'https://gdvrrwalbchwmgaucttl.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkdnJyd2FsYmNod21nYXVjdHRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MzM5MDQsImV4cCI6MjA5NjUwOTkwNH0._lrG5HkGdStq2c3Zbgxbwg8BJ6wlE3TleI69jjvzxjU'
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

const video = document.getElementById('video')
const canvas = document.getElementById('canvas')
const namaInput = document.getElementById('nama')
const btnMasuk = document.getElementById('btnMasuk')
const btnPulang = document.getElementById('btnPulang')
const statusDiv = document.getElementById('status')
const riwayatDiv = document.getElementById('riwayat')

// Nyalain kamera
navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}}).then(stream=>{
  video.srcObject = stream
}).catch(e=>statusDiv.innerText='Error kamera: '+e.message)

let currentNama = ''
let today = new Date().toISOString().split('T')[0] // format 2026-04-13

namaInput.addEventListener('input', e=>{
  currentNama = e.target.value.trim()
  cekStatusHariIni()
})

async function ambilFoto() {
  canvas.width = video.videoWidth
  canvas.height = video.videoHeight
  canvas.getContext('2d').drawImage(video, 0, 0)
  return canvas.toDataURL('image/jpeg', 0.8)
}

async function uploadFoto(base64, jenis) {
  const blob = await fetch(base64).then(r=>r.blob())
  const fileName = `${currentNama}_${today}_${jenis}_${Date.now()}.jpg`
  const {data, error} = await supabase.storage.from('absensi-foto').upload(fileName, blob)
  if(error) throw error
  const {data:url} = supabase.storage.from('absensi-foto').getPublicUrl(fileName)
  return url.publicUrl
}

async function cekStatusHariIni() {
  if(!currentNama) return
  const {data} = await supabase.from('absensi').select('*').eq('nama', currentNama).eq('tanggal', today).single()
  if(data) {
    if(data.waktu_masuk &&!data.waktu_pulang) {
      btnMasuk.disabled = true
      btnPulang.disabled = false
      statusDiv.innerText = 'Sudah absen masuk. Silakan absen pulang.'
    } else if(data.waktu_pulang) {
      btnMasuk.disabled = true
      btnPulang.disabled = true
      statusDiv.innerText = 'Sudah absen masuk & pulang hari ini.'
    }
    tampilRiwayat(data)
  } else {
    btnMasuk.disabled = false
    btnPulang.disabled = true
    statusDiv.innerText = ''
    riwayatDiv.innerText = 'Belum absen hari ini'
  }
}

btnMasuk.onclick = async () => {
  if(!currentNama) return alert('Isi nama dulu!')
  btnMasuk.disabled = true
  statusDiv.innerText = 'Upload foto masuk...'
  const foto = await ambilFoto()
  const url = await uploadFoto(foto, 'masuk')
  await supabase.from('absensi').insert({
    nama: currentNama,
    tanggal: today,
    waktu_masuk: new Date().toISOString(),
    foto_masuk_url: url
  })
  statusDiv.innerText = 'Absen masuk berhasil!'
  cekStatusHariIni()
}

btnPulang.onclick = async () => {
  btnPulang.disabled = true
  statusDiv.innerText = 'Upload foto pulang...'
  const foto = await ambilFoto()
  const url = await uploadFoto(foto, 'pulang')
  const {data} = await supabase.from('absensi').select('id').eq('nama', currentNama).eq('tanggal', today).single()
  await supabase.from('absensi').update({
    waktu_pulang: new Date().toISOString(),
    foto_pulang_url: url
  }).eq('id', data.id)
  statusDiv.innerText = 'Absen pulang berhasil!'
  cekStatusHariIni()
}

async function tampilRiwayat(data) {
  riwayatDiv.innerHTML = `
    <b>Masuk:</b> ${data.waktu_masuk? new Date(data.waktu_masuk).toLocaleTimeString() : '-'}<br>
    <img src="${data.foto_masuk_url}" style="max-width:100px"><br>
    <b>Pulang:</b> ${data.waktu_pulang? new Date(data.waktu_pulang).toLocaleTimeString() : '-'}<br>
    ${data.foto_pulang_url? `<img src="${data.foto_pulang_url}" style="max-width:100px">` : ''}
  `
}
</script>
</body>
</html>
